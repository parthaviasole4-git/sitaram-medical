<p-toast></p-toast>
<div class="page">
  <div class="page-header">
    <div class="page-subtitle">Verify OTP</div>
  </div>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="step-content">
      <div class="list-group">
        <div class="list-item">
          <label class="item-label">OTP</label>
          <input type="text" class="item-input" formControlName="otp" placeholder="Enter OTP">
        </div>
      </div>
      <div class="actions">
        <button class="btn primary full-width" type="submit" [disabled]="loading()">Verify</button>
        <button class="btn ghost full-width" type="button" (click)="resend()">Resend OTP</button>
      </div>
    </div>
  </form>
</div>
