<div class="page">
  <div class="page-header">
    <div class="page-subtitle">Prescription</div>
  </div>

  <ng-container *ngIf="hasItems()">
    
    <!-- Address step removed -->

    <!-- STEP 2: PAYMENT -->
    <div class="step-content" *ngIf="step() === 'payment'">
      <div class="list-group">
        <div class="list-item">
          <label class="item-label">Prescription Number</label>
          <input 
            type="text" 
            class="item-input" 
            [formControl]="prescriptionNo" 
            placeholder="Enter prescription number"
          >
        </div>
      </div>
      <div class="error-text" *ngIf="showError()">
        please enter PrescriptionNo
      </div>
      <div class="payment-methods" role="radiogroup" aria-label="Payment method" *ngIf="false">
        
        <!-- COD -->
        <button class="payment-card" type="button" [class.selected]="paymentMethod() === 'COD'" (click)="select('COD')">
          <div class="payment-icon-wrap">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.15-1.46-3.27-3.4h1.96c.1 1.05.95 1.48 1.81 1.48 1.2 0 1.96-.59 1.96-1.37 0-1.03-1.14-1.52-2.71-1.99-1.77-.53-3.13-1.3-3.13-3.23 0-1.85 1.34-3.11 3.01-3.42V4h2.67v1.9c1.61.32 2.76 1.42 2.87 3.06h-1.92c-.11-.83-.75-1.28-1.71-1.28-1.07 0-1.63.59-1.63 1.22 0 .93 1.25 1.42 2.76 1.86 1.84.54 3.08 1.41 3.08 3.33 0 1.88-1.44 3.12-3.08 3.4z"/>
            </svg>
          </div>
          <div class="payment-info">
            <div class="payment-title">Cash on Delivery</div>
            <div class="payment-sub">Pay safely when you receive your order</div>
          </div>
          <div class="radio-indicator"></div>
        </button>
        
        <!-- CARD -->
        <button class="payment-card" type="button" [class.selected]="paymentMethod() === 'Card'" (click)="select('Card')">
          <div class="payment-icon-wrap">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/>
            </svg>
          </div>
          <div class="payment-info">
            <div class="payment-title">Credit / Debit Card</div>
            <div class="payment-sub">Visa, Mastercard, RuPay</div>
          </div>
          <div class="radio-indicator"></div>
        </button>
  
        <!-- UPI -->
        <button class="payment-card" type="button" [class.selected]="paymentMethod() === 'UPI'" (click)="select('UPI')">
          <div class="payment-icon-wrap">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
            </svg>
          </div>
          <div class="payment-info">
            <div class="payment-title">UPI / QR Code</div>
            <div class="payment-sub">Google Pay, PhonePe, Paytm</div>
          </div>
          <div class="radio-indicator"></div>
        </button>

      </div>
    </div>

    <!-- ORDER SUMMARY (Always Visible) -->
    <div class="section-label">Order Summary</div>
    <div class="list-group">
      <div class="summary-item" *ngFor="let i of items()">
        <div class="item-details">
          <div class="item-name">{{ i.product.title }}</div>
          <div class="item-qty">{{ i.unitPriceText }} × {{ i.qty }}</div>
        </div>
        <div class="item-price">{{ i.lineTotalText }}</div>
      </div>
      
      <div class="total-row">
        <div class="total-label">Total Amount</div>
        <div class="total-value">{{ totalText() }}</div>
      </div>
    </div>

    <div class="actions">
      <!-- Proceed button removed -->

      <button class="btn primary full-width" type="button" *ngIf="step() === 'payment'" (click)="pay()" [disabled]="loading()">
        <span class="spinner" *ngIf="loading()"></span>
        {{ loading() ? 'Please wait...' : 'Continue' }}
      </button>
      
      <button class="btn ghost full-width" type="button" (click)="back()">
        Back to Cart
      </button>
    </div>
  </ng-container>
  
  <ng-container *ngIf="!hasItems()">
    <div class="empty-state">
      <div class="empty-icon">🛒</div>
      <div class="empty-text">Your cart is empty</div>
      <button class="btn primary" (click)="back()">Start Shopping</button>
    </div>
  </ng-container>
</div>
