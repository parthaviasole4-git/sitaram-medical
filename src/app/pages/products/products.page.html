<div class="page">
  <div class="header-row">
    <div>
      <h1 class="page-title">{{ categoryParam() || 'All Products' }}</h1>
      <div class="page-subtitle">Browse our collection</div>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input 
        type="text" 
        placeholder="Search products..." 
        [ngModel]="searchQuery()" 
        (ngModelChange)="onSearch($event)"
      >
    </div>
  </div>

  <div class="loading-state" *ngIf="loading(); else grid">
    <div class="spinner"></div>
    <div class="loading-text">Loading products...</div>
  </div>

  <ng-template #grid>
    <div class="product-grid" *ngIf="products().length > 0; else empty">
      <div class="product-card" *ngFor="let p of products()">
        <div class="image-wrap">
          <img class="image" [src]="p.imageDataUrl" [alt]="p.title" />
        </div>
        <div class="content">
          <div class="name">{{ p.title }}</div>
          <div class="tag">{{ p.tag }}</div>
          <div class="footer">
            <div class="price">{{ p.price }}</div>
            <button class="add-btn" type="button" (click)="addToCart(p)">
              <span>Add</span>
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 20a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm7 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-7-2h7a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-7a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2zm0-9h7v7h-7V9z"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </ng-template>

  <ng-template #empty>
    <div class="empty-state">
      <div class="empty-title">No products found</div>
      <div class="empty-subtitle">Try adjusting your search or category filter.</div>
    </div>
  </ng-template>

  <!-- Pagination -->
  <div class="pagination" *ngIf="!loading() && totalPages() > 1">
    <button class="page-btn nav" [disabled]="currentPage() === 1" (click)="setPage(currentPage() - 1)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    
    <button 
      class="page-btn number" 
      *ngFor="let p of pages()" 
      [class.active]="p === currentPage()"
      (click)="setPage(p)">
      {{ p }}
    </button>

    <button class="page-btn nav" [disabled]="currentPage() === totalPages()" (click)="setPage(currentPage() + 1)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>
