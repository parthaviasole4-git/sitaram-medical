<div class="page">
  <div class="top">
    <div class="header-row">
      <div>
        <div class="title">Users</div>
        <div class="subtitle">{{ total() }} customers</div>
      </div>
      <div class="search-box">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input 
          type="text" 
          placeholder="Search users..." 
          [ngModel]="searchQuery()" 
          (ngModelChange)="onSearch($event)"
        >
      </div>
    </div>
  </div>

  <div class="card empty-state" *ngIf="!hasAny()">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
    </div>
    <div class="empty-text">No users found</div>
    <div class="empty-sub" *ngIf="searchQuery()">Try adjusting your search query</div>
  </div>

  <div class="list" *ngIf="hasAny()">
    <div class="user" *ngFor="let u of paginatedCustomers()">
      <div class="avatar">
        {{ u.fullName.charAt(0).toUpperCase() }}
      </div>
      <div class="info">
        <div class="name">{{ u.fullName || 'Customer' }}</div>
        <div class="meta">{{ u.phone }} • {{ u.email || '-' }}</div>
        <div class="addr">{{ u.address || '-' }}</div>
      </div>
    </div>
  </div>

  <div class="pagination" *ngIf="totalPages() > 1">
    <button class="page-btn nav" [disabled]="currentPage() === 1" (click)="setPage(currentPage() - 1)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    
    <button 
      class="page-btn number" 
      *ngFor="let p of pages()" 
      [class.active]="p === currentPage()"
      (click)="setPage(p)">
      {{ p }}
    </button>

    <button class="page-btn nav" [disabled]="currentPage() === totalPages()" (click)="setPage(currentPage() + 1)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>
